version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkist_postgres
    environment:
      POSTGRES_USER: linkist
      POSTGRES_PASSWORD: linkist_password_2026
      POSTGRES_DB: linkist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkist"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linkist_network

  app:
    build: .
    container_name: linkist_app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: postgres
      DATABASE_URL: postgresql://linkist:linkist_password_2026@postgres:5432/linkist
      JWT_SECRET: linkist_production_secret_2026_change_in_production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/data:/app/server/data
    networks:
      - linkist_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  linkist_network:
    driver: bridge
